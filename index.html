<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crate — Album Ratings</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

:root{
  --ink:#15161A;
  --panel:#1D1F26;
  --paper:#EDE9DE;
  --paper-dim:#B7B2A4;
  --gold:#D9A84E;
  --teal:#4C9A93;
  --red:#C2604F;
  --line: rgba(237,233,222,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:32px 20px 80px;
}
.wrap{max-width:900px;margin:0 auto;}

header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:28px;
  border-bottom:1px solid var(--line);
  padding-bottom:18px;
  flex-wrap:wrap;
  gap:12px;
}
h1{
  font-family:'Fraunces',serif;
  font-weight:900;
  font-size:34px;
  letter-spacing:-0.5px;
  margin:0;
}
h1 span{color:var(--gold);}
.subtitle{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--paper-dim);
  text-transform:uppercase;
  letter-spacing:1.5px;
}
.spotify-status{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--teal);
  display:flex;
  align-items:center;
  gap:8px;
}
.spotify-status.disconnected{color:var(--paper-dim);}

/* Gate screen */
.gate{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:18px;
  padding:60px 0;
}
.gate p{color:var(--paper-dim);font-size:14px;line-height:1.6;max-width:520px;}
.gate code{
  background:var(--panel);
  padding:2px 6px;
  border-radius:3px;
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:var(--gold);
}

button{
  font-family:'Space Mono',monospace;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  cursor:pointer;
  border-radius:3px;
  border:1px solid transparent;
  transition:all .15s ease;
}
.btn-primary{
  background:var(--gold);
  color:var(--ink);
  padding:13px 26px;
  font-weight:700;
  border:none;
}
.btn-primary:hover{background:#e6ba63;}
.btn-primary:disabled{opacity:0.4;cursor:default;}
.btn-ghost{
  background:transparent;
  border:1px solid var(--line);
  color:var(--paper-dim);
  padding:8px 14px;
}
.btn-ghost:hover{border-color:var(--paper-dim);color:var(--paper);}
.btn-small{padding:6px 12px;font-size:11px;}

.app{display:none;}
.app.active{display:block;}

.search-row{
  display:flex;
  gap:8px;
  margin-bottom:18px;
}
input[type=text]{
  flex:1;
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--paper);
  padding:13px 16px;
  border-radius:3px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  outline:none;
}
input[type=text]:focus{border-color:var(--gold);}

.results{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:8px;
  margin-bottom:8px;
}
.results::-webkit-scrollbar{height:6px;}
.results::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.result-card{
  flex:0 0 128px;
  cursor:pointer;
  opacity:0.85;
  transition:opacity .15s;
}
.result-card:hover{opacity:1;}
.result-card img{
  width:128px;height:128px;
  border-radius:3px;
  display:block;
  border:1px solid var(--line);
  background:var(--panel);
}
.result-card .rtitle{
  font-size:12px;font-weight:600;margin-top:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.result-card .rartist{
  font-size:11px;color:var(--paper-dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.hint{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--paper-dim);
  margin:6px 0 30px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:4px;
  padding:24px;
  margin-bottom:40px;
  display:none;
}
.panel.active{display:block;}
.panel-top{
  display:flex;
  gap:22px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.panel-top img{
  width:140px;height:140px;
  border-radius:3px;
  border:1px solid var(--line);
  flex-shrink:0;
}
.panel-meta{flex:1;min-width:200px;}
.panel-meta .ptitle{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:22px;
  margin:0 0 2px;
}
.panel-meta .partist{
  color:var(--paper-dim);
  font-size:14px;
  margin-bottom:16px;
}
.score-stamp{
  display:inline-flex;
  align-items:baseline;
  gap:6px;
  border:1px solid var(--gold);
  color:var(--gold);
  padding:6px 14px;
  border-radius:3px;
  font-family:'Space Mono',monospace;
}
.score-stamp .num{font-size:26px;font-weight:700;}
.score-stamp .of{font-size:11px;color:var(--paper-dim);}
.score-stamp.empty{color:var(--paper-dim);border-color:var(--line);}

.tracklist{border-top:1px solid var(--line);}
.track-row{
  display:flex;
  align-items:center;
  gap:14px;
  padding:11px 0;
  border-bottom:1px solid var(--line);
}
.track-num{
  font-family:'Space Mono',monospace;
  color:var(--paper-dim);
  font-size:12px;
  width:22px;
  text-align:right;
  flex-shrink:0;
}
.track-name{
  flex:1;
  font-size:14px;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.eq{
  display:flex;
  gap:2px;
  cursor:pointer;
  flex-shrink:0;
}
.eq .bar{
  width:6px;
  background:var(--line);
  border-radius:1px;
  transition:background .1s;
}
.eq .bar:nth-child(1){height:6px;}
.eq .bar:nth-child(2){height:9px;}
.eq .bar:nth-child(3){height:12px;}
.eq .bar:nth-child(4){height:15px;}
.eq .bar:nth-child(5){height:18px;}
.eq .bar:nth-child(6){height:21px;}
.eq .bar:nth-child(7){height:24px;}
.eq .bar:nth-child(8){height:27px;}
.eq .bar:nth-child(9){height:30px;}
.eq .bar:nth-child(10){height:33px;}
.eq .bar.filled{background:var(--teal);}
.eq:hover .bar.filled{background:var(--gold);}
.track-rating-num{
  font-family:'Space Mono',monospace;
  font-size:12px;
  width:24px;
  color:var(--paper-dim);
  text-align:right;
  flex-shrink:0;
}

.panel-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}

.section-label{
  font-family:'Space Mono',monospace;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--paper-dim);
  margin-bottom:14px;
  display:flex;
  justify-content:space-between;
}

.library{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:18px;
}
.lib-card{cursor:pointer;position:relative;}
.lib-card img{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  border-radius:3px;
  border:1px solid var(--line);
  display:block;
  background:var(--panel);
}
.lib-card .lscore{
  position:absolute;
  top:6px;right:6px;
  background:var(--ink);
  border:1px solid var(--gold);
  color:var(--gold);
  font-family:'Space Mono',monospace;
  font-size:12px;
  font-weight:700;
  padding:2px 7px;
  border-radius:3px;
}
.lib-card .ltitle{
  font-size:13px;font-weight:600;margin-top:8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.lib-card .lartist{
  font-size:12px;color:var(--paper-dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.lib-card .ldelete{
  position:absolute;
  top:6px;left:6px;
  background:var(--ink);
  border:1px solid var(--red);
  color:var(--red);
  font-family:'Space Mono',monospace;
  font-size:11px;
  width:20px;height:20px;
  border-radius:3px;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  line-height:1;
}
.lib-card:hover .ldelete{display:flex;}

.empty-state{
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:var(--paper-dim);
  border:1px dashed var(--line);
  border-radius:4px;
  padding:30px;
  text-align:center;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Cr<span>ate</span></h1>
      <div class="subtitle">Album &amp; track ratings — Spotify</div>
    </div>
    <div id="spotifyStatus" class="spotify-status disconnected">● Not connected</div>
  </header>

  <div class="gate" id="gate">
    <p>Crate pulls album art and tracklists straight from Spotify's catalog. Connect your account once — this only reads public catalog data, nothing from your library or playback.</p>
    <button class="btn-primary" id="connectBtn">Connect Spotify</button>
    <p id="gateError" style="color:var(--red);"></p>
  </div>

  <div class="app" id="app">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search an album or artist…" autocomplete="off">
      <button class="btn-primary" id="searchBtn">Search</button>
    </div>
    <div id="searchStatus" class="hint"></div>
    <div class="results" id="results"></div>

    <div class="panel" id="panel">
      <div class="panel-top">
        <img id="panelArt" src="" alt="">
        <div class="panel-meta">
          <p class="ptitle" id="panelTitle"></p>
          <p class="partist" id="panelArtist"></p>
          <div class="score-stamp empty" id="scoreStamp">
            <span class="num" id="scoreNum">—</span>
            <span class="of">/ 10 avg</span>
          </div>
        </div>
      </div>
      <div class="tracklist" id="tracklist"></div>
      <div class="panel-actions">
        <button class="btn-ghost" id="closeBtn">Close</button>
        <button class="btn-primary" id="saveBtn">Save to library</button>
      </div>
    </div>

    <div class="section-label"><span>Your library</span><span id="libCount"></span></div>
    <div class="library" id="library"></div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
const CLIENT_ID = '52f199f59a7e4ef486e35a087882039e';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = ''; // catalog search & album lookup need no user scopes

/* ============ PKCE HELPERS ============ */
function base64urlEncode(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function randomVerifier(len=64){
  const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const values = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(values, v => possible[v % possible.length]).join('');
}
async function sha256(plain){
  const data = new TextEncoder().encode(plain);
  return await crypto.subtle.digest('SHA-256', data);
}

async function startLogin(){
  const verifier = randomVerifier();
  localStorage.setItem('crate:pkce_verifier', verifier);
  const challenge = base64urlEncode(await sha256(verifier));
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: CLIENT_ID,
    scope: SCOPES,
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeCodeForToken(code){
  const verifier = localStorage.getItem('crate:pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if(!res.ok) throw new Error('Token exchange failed (' + res.status + ')');
  return await res.json();
}

async function refreshToken(refresh_token){
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'refresh_token',
    refresh_token
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if(!res.ok) throw new Error('Token refresh failed (' + res.status + ')');
  return await res.json();
}

function saveTokens(data){
  const expiresAt = Date.now() + (data.expires_in * 1000) - 30000; // 30s safety margin
  localStorage.setItem('crate:access_token', data.access_token);
  localStorage.setItem('crate:expires_at', String(expiresAt));
  if(data.refresh_token) localStorage.setItem('crate:refresh_token', data.refresh_token);
}

async function getValidToken(){
  const token = localStorage.getItem('crate:access_token');
  const expiresAt = parseInt(localStorage.getItem('crate:expires_at') || '0', 10);
  const refresh = localStorage.getItem('crate:refresh_token');
  if(token && Date.now() < expiresAt) return token;
  if(refresh){
    const data = await refreshToken(refresh);
    saveTokens(data);
    return data.access_token;
  }
  return null;
}

function disconnect(){
  ['crate:pkce_verifier','crate:access_token','crate:expires_at','crate:refresh_token']
    .forEach(k => localStorage.removeItem(k));
  location.reload();
}

/* ============ APP STATE ============ */
let currentAlbum = null;

const gate = document.getElementById('gate');
const app = document.getElementById('app');
const statusEl = document.getElementById('spotifyStatus');
const resultsEl = document.getElementById('results');
const searchStatus = document.getElementById('searchStatus');
const panel = document.getElementById('panel');
const libraryEl = document.getElementById('library');
const libCountEl = document.getElementById('libCount');

function showApp(){
  gate.style.display = 'none';
  app.classList.add('active');
  statusEl.textContent = '● Connected';
  statusEl.classList.remove('disconnected');
  statusEl.innerHTML = '● Connected &nbsp; <button class="btn-ghost btn-small" id="disconnectBtn">Disconnect</button>';
  document.getElementById('disconnectBtn').addEventListener('click', disconnect);
  loadLibrary();
}

function showGate(err){
  gate.style.display = 'flex';
  app.classList.remove('active');
  if(err) document.getElementById('gateError').textContent = err;
}

document.getElementById('connectBtn').addEventListener('click', startLogin);

async function init(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const errParam = params.get('error');

  if(errParam){
    showGate('Spotify login was cancelled or denied.');
    window.history.replaceState({}, '', REDIRECT_URI);
    return;
  }

  if(code){
    try{
      const data = await exchangeCodeForToken(code);
      saveTokens(data);
      window.history.replaceState({}, '', REDIRECT_URI);
      showApp();
      return;
    }catch(err){
      console.error(err);
      showGate('Could not complete Spotify login. Try connecting again.');
      window.history.replaceState({}, '', REDIRECT_URI);
      return;
    }
  }

  const token = await getValidToken().catch(() => null);
  if(token){ showApp(); } else { showGate(); }
}

/* ============ SPOTIFY DATA ============ */
async function spotifyFetch(url){
  const token = await getValidToken();
  if(!token){ showGate('Your session expired — reconnect to Spotify.'); throw new Error('no token'); }
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
  if(res.status === 401){
    showGate('Your session expired — reconnect to Spotify.');
    throw new Error('unauthorized');
  }
  if(!res.ok) throw new Error('Spotify request failed (' + res.status + ')');
  return await res.json();
}

async function searchAlbums(){
  const term = document.getElementById('searchInput').value.trim();
  if(!term) return;
  searchStatus.textContent = 'Searching…';
  resultsEl.innerHTML = '';
  try{
    const data = await spotifyFetch('https://api.spotify.com/v1/search?type=album&limit=12&q=' + encodeURIComponent(term));
    const albums = data.albums ? data.albums.items : [];
    if(albums.length === 0){
      searchStatus.textContent = 'No albums found. Try a different search.';
      return;
    }
    searchStatus.textContent = albums.length + ' result(s) — click one to open its tracklist.';
    albums.forEach(album => {
      const art = album.images && album.images[0] ? album.images[0].url : '';
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <img src="${art}" alt="">
        <div class="rtitle">${escapeHtml(album.name)}</div>
        <div class="rartist">${escapeHtml(album.artists.map(a=>a.name).join(', '))}</div>
      `;
      card.addEventListener('click', () => openAlbum(album));
      resultsEl.appendChild(card);
    });
  }catch(err){
    if(err.message !== 'no token' && err.message !== 'unauthorized'){
      searchStatus.textContent = 'Search failed — check your connection and try again.';
    }
    console.error(err);
  }
}

async function openAlbum(albumSummary){
  searchStatus.textContent = 'Loading tracklist…';
  try{
    const saved = loadFromLibraryStore(albumSummary.id);
    if(saved){
      currentAlbum = saved;
    } else {
      const full = await spotifyFetch('https://api.spotify.com/v1/albums/' + albumSummary.id);
      const art = full.images && full.images[0] ? full.images[0].url : '';
      const tracks = full.tracks.items
        .sort((a,b) => (a.track_number||0) - (b.track_number||0))
        .map(t => ({ trackId: t.id, name: t.name, rating: 0 }));
      currentAlbum = {
        albumId: full.id,
        artist: full.artists.map(a=>a.name).join(', '),
        title: full.name,
        artworkUrl: art,
        tracks
      };
    }
    renderPanel();
    searchStatus.textContent = '';
    panel.scrollIntoView({behavior:'smooth', block:'start'});
  }catch(err){
    if(err.message !== 'no token' && err.message !== 'unauthorized'){
      searchStatus.textContent = 'Could not load tracklist — try again.';
    }
    console.error(err);
  }
}

/* ============ RATING UI ============ */
function renderPanel(){
  panel.classList.add('active');
  document.getElementById('panelArt').src = currentAlbum.artworkUrl;
  document.getElementById('panelTitle').textContent = currentAlbum.title;
  document.getElementById('panelArtist').textContent = currentAlbum.artist;

  const tl = document.getElementById('tracklist');
  tl.innerHTML = '';
  currentAlbum.tracks.forEach((track, idx) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    const bars = Array.from({length:10}, (_, i) => {
      const filled = track.rating > i ? 'filled' : '';
      return `<div class="bar ${filled}" data-val="${i+1}"></div>`;
    }).join('');
    row.innerHTML = `
      <div class="track-num">${idx+1}</div>
      <div class="track-name">${escapeHtml(track.name)}</div>
      <div class="eq" data-track="${idx}">${bars}</div>
      <div class="track-rating-num">${track.rating || '–'}</div>
    `;
    tl.appendChild(row);
    const eq = row.querySelector('.eq');
    eq.addEventListener('click', (e) => {
      const bar = e.target.closest('.bar');
      if(!bar) return;
      const val = parseInt(bar.dataset.val, 10);
      track.rating = (track.rating === val) ? 0 : val;
      renderPanel();
    });
  });
  updateScoreStamp();
}

function updateScoreStamp(){
  const rated = currentAlbum.tracks.filter(t => t.rating > 0);
  const stamp = document.getElementById('scoreStamp');
  const num = document.getElementById('scoreNum');
  if(rated.length === 0){
    stamp.classList.add('empty');
    num.textContent = '—';
  } else {
    const avg = rated.reduce((s,t) => s + t.rating, 0) / rated.length;
    stamp.classList.remove('empty');
    num.textContent = avg.toFixed(1);
  }
}

document.getElementById('closeBtn').addEventListener('click', () => {
  panel.classList.remove('active');
  currentAlbum = null;
});

document.getElementById('saveBtn').addEventListener('click', () => {
  if(!currentAlbum) return;
  saveToLibraryStore(currentAlbum);
  loadLibrary();
});

/* ============ LOCAL LIBRARY STORE ============ */
function getLibraryStore(){
  try{
    return JSON.parse(localStorage.getItem('crate:library') || '{}');
  }catch(e){ return {}; }
}
function loadFromLibraryStore(albumId){
  const store = getLibraryStore();
  return store[albumId] || null;
}
function saveToLibraryStore(album){
  const store = getLibraryStore();
  store[album.albumId] = album;
  localStorage.setItem('crate:library', JSON.stringify(store));
}
function deleteFromLibraryStore(albumId){
  const store = getLibraryStore();
  delete store[albumId];
  localStorage.setItem('crate:library', JSON.stringify(store));
}

function albumAvg(album){
  const rated = album.tracks.filter(t => t.rating > 0);
  if(rated.length === 0) return null;
  return rated.reduce((s,t) => s + t.rating, 0) / rated.length;
}

function loadLibrary(){
  const store = getLibraryStore();
  const albums = Object.values(store);
  if(albums.length === 0){
    libraryEl.innerHTML = '<div class="empty-state">No albums saved yet — search above, rate some tracks, and save.</div>';
    libCountEl.textContent = '';
    return;
  }
  albums.sort((a,b) => {
    const av = albumAvg(a), bv = albumAvg(b);
    if(av === null && bv === null) return 0;
    if(av === null) return 1;
    if(bv === null) return -1;
    return bv - av;
  });
  libCountEl.textContent = albums.length + ' album(s)';
  libraryEl.innerHTML = '';
  albums.forEach(album => {
    const avg = albumAvg(album);
    const card = document.createElement('div');
    card.className = 'lib-card';
    card.innerHTML = `
      <div class="ldelete" title="Remove">✕</div>
      ${avg !== null ? `<div class="lscore">${avg.toFixed(1)}</div>` : ''}
      <img src="${album.artworkUrl}" alt="">
      <div class="ltitle">${escapeHtml(album.title)}</div>
      <div class="lartist">${escapeHtml(album.artist)}</div>
    `;
    card.addEventListener('click', (e) => {
      if(e.target.classList.contains('ldelete')) return;
      currentAlbum = album;
      renderPanel();
      panel.scrollIntoView({behavior:'smooth', block:'start'});
    });
    card.querySelector('.ldelete').addEventListener('click', (e) => {
      e.stopPropagation();
      if(!confirm(`Remove "${album.title}" from your library?`)) return;
      deleteFromLibraryStore(album.albumId);
      loadLibrary();
    });
    libraryEl.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

document.getElementById('searchBtn').addEventListener('click', searchAlbums);
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') searchAlbums();
});

init();
</script>
</body>
</html>
